<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Esface College Prep Elite - Roster</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', sans-serif;
            background: linear-gradient(135deg, #f5f5f5 0%, #e0e0e0 100%);
            color: #1a1a1a;
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 18px;
            color: #666;
        }

        .filters {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            background: white;
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .filter-group {
            flex: 1;
            min-width: 180px;
        }

        .filter-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #999;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            background: white;
            cursor: pointer;
            transition: all 0.2s;
        }

        select:hover {
            border-color: #333;
        }

        select:focus {
            outline: none;
            border-color: #0066cc;
            box-shadow: 0 0 0 2px rgba(0, 102, 204, 0.1);
        }

        .roster-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .roster-info {
            font-size: 14px;
            color: #666;
            background: white;
            padding: 0.75rem 1rem;
            border-radius: 8px;
        }

        .roster-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .player-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            border: 1px solid #eee;
        }

        .player-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.15);
        }

        .player-photo {
            width: 100%;
            height: 220px;
            object-fit: cover;
            display: block;
        }

        .player-info {
            padding: 1rem;
        }

        .player-name {
            font-size: 16px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 6px;
        }

        .player-stats {
            font-size: 12px;
            color: #666;
            margin-bottom: 4px;
            line-height: 1.5;
        }

        .badge {
            display: inline-block;
            background: #0066cc;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            margin-top: 8px;
            margin-right: 4px;
        }

        .badge-class {
            background: #2ecc71;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 2rem;
            max-width: 800px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .close-btn {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #999;
            transition: color 0.2s;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-btn:hover {
            color: #333;
        }

        .profile-header {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 2rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid #eee;
        }

        .profile-photo {
            width: 140px;
            height: 160px;
            object-fit: cover;
            border-radius: 8px;
            flex-shrink: 0;
        }

        .profile-intro {
            flex: 1;
        }

        .profile-intro h2 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .profile-intro p {
            font-size: 14px;
            color: #666;
            margin-bottom: 6px;
        }

        .profile-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 12px;
            font-size: 13px;
        }

        .section {
            margin-bottom: 2rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid #eee;
        }

        .section:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .section-title {
            font-size: 12px;
            font-weight: 700;
            color: #999;
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            font-size: 14px;
        }

        .info-grid.full {
            grid-template-columns: 1fr;
        }

        .info-item {
            font-size: 14px;
        }

        .info-item p {
            margin: 0 0 4px 0;
            color: #1a1a1a;
        }

        .info-label {
            font-size: 12px;
            color: #999;
            margin-bottom: 4px;
            font-weight: 600;
        }

        .video-section {
            background: #f5f5f5;
            padding: 1rem;
            border-radius: 8px;
            margin-top: 12px;
        }

        .video-link {
            display: inline-block;
            color: #0066cc;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
            font-weight: 600;
        }

        .video-link:hover {
            color: #0052a3;
        }

        iframe {
            border-radius: 8px;
            max-width: 100%;
        }

        .empty-state {
            text-align: center;
            padding: 3rem 2rem;
            color: #999;
            background: white;
            border-radius: 12px;
            grid-column: 1 / -1;
        }

        @media (max-width: 768px) {
            .roster-grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                gap: 1rem;
            }

            .filters {
                flex-direction: column;
                gap: 1rem;
            }

            .filter-group {
                min-width: unset;
            }

            .profile-header {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }

            .info-grid {
                grid-template-columns: 1fr;
            }

            .player-photo {
                height: 160px;
            }

            h1 {
                font-size: 24px;
            }
        }
    </style>
</head>

        function filterPlayers() {
            const teamFilter = document.getElementById('teamFilter').value;
            const classFilter = document.getElementById('classFilter').value;

            const filtered = players.filter(p => {
                const teamMatch = teamFilter === 'All' || p.team === teamFilter;
                const classMatch = classFilter === 'All' || p.class === classFilter;
                return teamMatch && classMatch;
            });

            renderRoster(filtered);
            document.getElementById('playerCount').textContent = filtered.length;
        }

        function renderRoster(playerList) {
            const grid = document.getElementById('rosterGrid');
            grid.innerHTML = '';

            if (playerList.length === 0) {
                grid.innerHTML = '<div class="empty-state">No players match your filters</div>';
                return;
            }

            playerList.forEach(player => {
                const card = document.createElement('div');
                card.className = 'player-card';
                card.onclick = () => openModal(player);
                card.innerHTML = `
                    <img src="${player.photo}" alt="${player.name}" class="player-photo" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22220%22%3E%3Crect fill=%22%23eee%22 width=%22200%22 height=%22220%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 font-size=%2214%22 fill=%22%23999%22 text-anchor=%22middle%22 dy=%22.3em%22%3EPhoto%3C/text%3E%3C/svg%3E'">
                    <div class="player-info">
                        <div class="player-name">${player.name}</div>
                        <div class="player-stats">${player.height} | ${player.position.split(',')[0]}</div>
                        <div class="player-stats">${player.hs}</div>
                        <span class="badge">${player.team}</span>
                        <span class="badge badge-class">Class of ${player.class}</span>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function openModal(player) {
            const profile = document.getElementById('playerProfile');
            let videoHTML = '';

            if (player.videoType !== 'none' && player.videoLink) {
                if (player.videoType === 'youtube' && player.videoId) {
                    videoHTML = `
                        <div class="section">
                            <div class="section-title">Highlight Video</div>
                            <iframe width="100%" height="280" src="https://www.youtube.com/embed/${player.videoId}" frameborder="0" allowfullscreen></iframe>
                        </div>
                    `;
                } else {
                    videoHTML = `
                        <div class="section">
                            <div class="section-title">Highlight Video</div>
                            <div class="video-section">
                                <a href="${player.videoLink}" target="_blank" rel="noopener noreferrer" class="video-link">
                                    View Video on ${player.videoType.charAt(0).toUpperCase() + player.videoType.slice(1)} ↗
                                </a>
                            </div>
                        </div>
                    `;
                }
            }

            let wingsSpan = player.wingspan ? `WS: ${player.wingspan}` : '';

            profile.innerHTML = `
                <div class="profile-header">
                    <img src="${player.photo}" alt="${player.name}" class="profile-photo" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22140%22 height=%22160%22%3E%3Crect fill=%22%23eee%22 width=%22140%22 height=%22160%22/%3E%3C/svg%3E'">
                    <div class="profile-intro">
                        <h2>${player.name}</h2>
                        <p><strong>${player.team}</strong></p>
                        <p>${player.position}</p>
                        <div class="profile-stats">
                            <div><strong>${player.height}</strong></div>
                            ${player.weight ? `<div><strong>${player.weight} lbs</strong></div>` : ''}
                            ${wingsSpan ? `<div><strong>${wingsSpan}</strong></div>` : ''}
                            <div><strong>Class of ${player.class}</strong></div>
                        </div>
                    </div>
                </div>

                <div class="section">
                    <div class="info-grid">
                        <div>
                            <div class="section-title">High School</div>
                            <p>${player.hs}</p>
                            ${player.hsCoach ? `<p class="info-label">Coach: ${player.hsCoach}</p>` : ''}
                            ${player.hsCoachPhone ? `<p class="info-label">${player.hsCoachPhone}</p>` : ''}
                        </div>
                        <div>
                            <div class="section-title">Academics</div>
                            ${player.gpa ? `<p><strong>GPA: ${player.gpa}</strong></p>` : ''}
                        </div>
                    </div>
                </div>

                ${videoHTML}

                <div class="section">
                    <div class="section-title">Player Contact</div>
                    <p><strong>${player.playerPhone}</strong></p>
                </div>

                <div class="section">
                    <div class="section-title">Parent/Guardian Contact</div>
                    <div class="info-grid full">
                        <div>
                            <p class="info-label">Name</p>
                            <p><strong>${player.parent}</strong></p>
                        </div>
                        <div>
                            <p class="info-label">Email</p>
                            <p><strong>${player.parentEmail}</strong></p>
                        </div>
                        <div>
                            <p class="info-label">Phone</p>
                            <p><strong>${player.parentPhone}</strong></p>
                        </div>
                    </div>
                </div>

                ${(player.instagram || player.twitter) ? `
                    <div class="section">
                        <div class="section-title">Social Media</div>
                        <div class="info-grid full">
                            ${player.instagram ? `<p>Instagram: <strong>${player.instagram}</strong></p>` : ''}
                            ${player.twitter ? `<p>X/Twitter: <strong>${player.twitter}</strong></p>` : ''}
                        </div>
                    </div>
                ` : ''}
            `;

            document.getElementById('modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        document.getElementById('teamFilter').addEventListener('change', filterPlayers);
        document.getElementById('classFilter').addEventListener('change', filterPlayers);
        document.getElementById('modal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('modal')) {
                closeModal();
            }
        });

        // Initialize
        renderRoster(players);
    </script>
</body>
</html>
